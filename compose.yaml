services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      POSTGRES_URL: jdbc:postgresql://postgres:5432/tessera
      POSTGRES_USER: tessera
      POSTGRES_PASSWORD: tessera
    depends_on:
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  postgres:
    image: postgres:18.4
    environment:
      POSTGRES_DB: tessera
      POSTGRES_USER: tessera
      POSTGRES_PASSWORD: tessera
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tessera"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v26.1.12
    command:
      - redpanda
      - start
      - --mode=dev-container
      - --smp=1
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
    ports:
      - "19092:19092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
