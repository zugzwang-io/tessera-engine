name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - uses: gradle/actions/setup-gradle@v6
      - run: ./gradlew build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: docker compose up --build --detach --wait
      - run: curl -fsS http://localhost:8080/ | grep -q 'Hello, world!'
      - name: Write a change through to the log
        run: |
          curl -fsS -X POST -H 'Content-Type: application/json' \
            -d '{"entries":[{"key":"smoke","value":"AQ=="}]}' \
            http://localhost:8080/v1/collections/smoke/changes | grep -q '"sequence":0'
      - run: docker compose down
